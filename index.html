
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond@5/300-italic.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond@5/400.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/space-mono@5/400.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/space-mono@5/700.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#0a0a0a;color:#f0ebe0;
  font-family:"PingFang SC","Noto Sans SC","Microsoft YaHei","黑体",sans-serif;
  overflow-x:hidden;min-height:100vh;
}

@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spinReverse{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes boxReveal{
  from{clip-path:inset(50% 50% 50% 50% round 4px);opacity:0;transform:scale(0.94);}
  to{clip-path:inset(0% 0% 0% 0% round 0px);opacity:1;transform:scale(1);}
}

nav{position:sticky;top:0;z-index:60;display:flex;justify-content:space-between;align-items:center;padding:14px 32px;background:rgba(10,10,10,0.96);border-bottom:1px solid rgba(240,235,224,0.07);backdrop-filter:blur(8px);}
.nav-links{display:flex;gap:0;align-items:center;}
.nav-link{background:none;border:none;color:rgba(240,235,224,0.32);cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:0.06em;padding:8px 14px;transition:color 0.2s;position:relative;}
.nav-link:hover,.nav-link.active{color:#f0ebe0;}
.nav-link.active::after{content:'';position:absolute;bottom:-1px;left:14px;right:14px;height:1px;background:#7c3aed;}
.nav-logo{font-family:inherit;font-size:26px;font-weight:900;cursor:pointer;background:none;border:none;
  background:linear-gradient(135deg,#7c3aed 0%,#a855f7 40%,#22c55e 70%,#f59e0b 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:0.08em;}

.card{cursor:pointer;position:relative;}
.card-img{transition:transform 1.1s cubic-bezier(0.25,0.46,0.45,0.94);width:100%;height:100%;object-fit:cover;display:block;}
.card:hover .card-img{transform:scale(1.055);}
.open-badge{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.45s;background:rgba(8,8,8,0.22);}
.card:hover .open-badge{opacity:1;}

.entry{opacity:0;clip-path:inset(50% 50% 50% 50% round 4px);transform:scale(0.94);}
.entry.vis{animation:boxReveal 0.78s cubic-bezier(0.22,1,0.36,1) both;}

.nbtn{background:rgba(240,235,224,0.07);border:1px solid rgba(240,235,224,0.14);color:#f0ebe0;cursor:pointer;width:54px;height:54px;font-size:22px;display:flex;align-items:center;justify-content:center;transition:background 0.2s,border-color 0.2s;}
.nbtn:hover{background:rgba(240,235,224,0.14);border-color:rgba(240,235,224,0.28);}
.thb{background:none;border:2px solid transparent;padding:2px;cursor:pointer;transition:border-color 0.25s,opacity 0.25s;}
.thb.on{border-color:#7c3aed;}
.thb:not(.on){opacity:0.3;}
.thb:not(.on):hover{opacity:0.6;}
.backbtn{background:none;border:1px solid rgba(240,235,224,0.18);color:rgba(240,235,224,0.6);cursor:pointer;font-size:12px;letter-spacing:0.1em;padding:8px 16px;transition:border-color 0.2s,color 0.2s;font-family:inherit;}
.backbtn:hover{border-color:rgba(240,235,224,0.55);color:#f0ebe0;}
.dot-progress span{display:inline-block;width:5px;height:5px;background:rgba(240,235,224,0.2);border-radius:50%;margin:0 3px;transition:background 0.25s;cursor:pointer;}
.dot-progress span.on{background:#7c3aed;}

.rotating-badge{position:relative;width:96px;height:96px;flex-shrink:0;}
.badge-outer{animation:spin 12s linear infinite;transform-origin:center;}
.badge-inner{animation:spinReverse 6s linear infinite;transform-origin:center;}

.polaroid{background:#f5f0e8;padding:12px 12px 32px;box-shadow:0 4px 24px rgba(0,0,0,0.5);cursor:pointer;transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94);}
.polaroid:hover{transform:translateY(-6px);}
.polaroid img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.polaroid-date{text-align:center;margin-top:8px;font-family:inherit;font-size:11px;letter-spacing:0.05em;color:#2a2420;}

.grid-thumb{cursor:pointer;overflow:hidden;position:relative;background:#111;}
.grid-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);}
.grid-thumb:hover img{transform:scale(1.08);}
.grid-thumb-meta{position:absolute;bottom:0;left:0;right:0;padding:8px 10px;background:linear-gradient(transparent,rgba(0,0,0,0.85));opacity:0;transition:opacity 0.3s;}
.grid-thumb:hover .grid-thumb-meta{opacity:1;}

.upload-area{border:1px dashed rgba(240,235,224,0.2);padding:40px;text-align:center;cursor:pointer;transition:border-color 0.3s,background 0.3s;}
.upload-area:hover{border-color:rgba(124,58,237,0.5);background:rgba(124,58,237,0.04);}
input[type=file]{display:none;}

.toggle-btn{background:rgba(240,235,224,0.06);border:1px solid rgba(240,235,224,0.12);color:rgba(240,235,224,0.5);cursor:pointer;font-family:inherit;font-size:12px;letter-spacing:0.05em;padding:6px 12px;transition:all 0.2s;}
.toggle-btn.on{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.4);color:#a855f7;}

/* ── 强调色改为紫色系 ── */
.accent{color:#a855f7;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DEFAULT_DIARY=[
  {id:"2026-05-25",date:"2026年5月25日",day:"周一",mood:"黄金时刻",isMasterpiece:false,
   photos:[
    {url:"https://picsum.photos/seed/gha1/1400/920",thumb:"https://picsum.photos/seed/gha1/300/300"},
    {url:"https://picsum.photos/seed/gha2/920/1300",thumb:"https://picsum.photos/seed/gha2/300/300"},
    {url:"https://picsum.photos/seed/gha3/1400/920",thumb:"https://picsum.photos/seed/gha3/300/300"},
   ],
   caption:"下午五点的光，像五月末每次那样——从侧面斜射进来，把一切都镀成了胶片的质感。我特意走远路回家，只为多待在那道光里一会儿。",featured:true},
  {id:"2026-05-24",date:"2026年5月24日",day:"周日",mood:"静物",isMasterpiece:true,
   photos:[
    {url:"https://picsum.photos/seed/slb1/1400/920",thumb:"https://picsum.photos/seed/slb1/300/300"},
    {url:"https://picsum.photos/seed/slb2/920/1300",thumb:"https://picsum.photos/seed/slb2/300/300"},
   ],
   caption:"周日的安静，那种感觉是挣来的。什么都没动，只有窗帘在动。",featured:true},
  {id:"2026-05-23",date:"2026年5月23日",day:"周六",mood:"陌生人",isMasterpiece:false,
   photos:[
    {url:"https://picsum.photos/seed/strc1/1400/920",thumb:"https://picsum.photos/seed/strc1/300/300"},
    {url:"https://picsum.photos/seed/strc2/1400/920",thumb:"https://picsum.photos/seed/strc2/300/300"},
    {url:"https://picsum.photos/seed/strc3/920/1300",thumb:"https://picsum.photos/seed/strc3/300/300"},
   ],
   caption:"Vermont大道农夫集市。我总是看得比买得多。那个卖玫瑰的大叔每周都在，他主动告诉我已经十一年了。",featured:false},
  {id:"2026-05-22",date:"2026年5月22日",day:"周五",mood:"阴天",isMasterpiece:true,
   photos:[{url:"https://picsum.photos/seed/ovcast/1400/920",thumb:"https://picsum.photos/seed/ovcast/300/300"}],
   caption:"只拍了一张。灰，但真实。有些日子就是一帧的事。",featured:true},
  {id:"2026-05-21",date:"2026年5月21日",day:"周四",mood:"深夜漫步",isMasterpiece:false,
   photos:[
    {url:"https://picsum.photos/seed/nwlk1/1400/920",thumb:"https://picsum.photos/seed/nwlk1/300/300"},
    {url:"https://picsum.photos/seed/nwlk2/1400/920",thumb:"https://picsum.photos/seed/nwlk2/300/300"},
    {url:"https://picsum.photos/seed/nwlk3/920/1300",thumb:"https://picsum.photos/seed/nwlk3/300/300"},
   ],
   caption:"睡不着，凌晨一点出门走。城市几乎空了的时候有不一样的声音。这些街道属于外卖员和偶尔的失眠者。",featured:false},
];

let DIARY=[...DEFAULT_DIARY];

const MARQUEES=[
  "胶片  ·  光  ·  阴影  ·  记忆  ·  每日  ·  模拟  ·  颗粒  ·  时间  ·  静止",
  "慢下来  ·  再看一眼  ·  停留  ·  注意  ·  游荡  ·  归来  ·  记住",
  "洛杉矶  ·  五月末  ·  黄金时刻  ·  35MM  ·  观察  ·  活在当下",
];

let state={page:'home',active:null,pidx:0};
function setState(updates){Object.assign(state,updates);render();window.scrollTo(0,0);}

async function loadCloudEntries(){
  try{
    const res=await fetch('/api/entries',{cache:'no-store'});
    if(!res.ok)throw new Error('无法读取云端日记');
    const data=await res.json();
    DIARY=[...(data.entries||[]),...DEFAULT_DIARY];
    render();
  }catch(e){
    console.warn(e);
  }
}

function Marquee(text,speed=28,reverse=false){
  const t=`${text}  ·  ${text}  ·  ${text}  ·  ${text}`;
  return `<div style="overflow:hidden;padding:12px 0;margin:24px 0;border-top:1px solid rgba(240,235,224,0.045);border-bottom:1px solid rgba(240,235,224,0.045);">
    <div style="display:inline-flex;white-space:nowrap;animation:mq ${speed}s linear infinite;animation-direction:${reverse?'reverse':'normal'}">
      <span style="font-size:12px;letter-spacing:0.15em;color:rgba(240,235,224,0.16);padding-right:48px;">${t}</span>
      <span style="font-size:12px;letter-spacing:0.15em;color:rgba(240,235,224,0.16);padding-right:48px;">${t}</span>
    </div>
  </div>`;
}

function RotatingBadge(){
  /* ── 想换图标：把下面 <text> 换成阿里图标的 <path>，
     并在外层 <g> 加上 transform="translate(24,24) scale(0.05)" ── */
  return `<div class="rotating-badge" aria-hidden="true">
    <svg viewBox="0 0 96 96" width="96" height="96">
      <defs>
        <path id="cp" d="M48,48 m-34,0 a34,34 0 1,1 68,0 a34,34 0 1,1 -68,0"/>
      </defs>
      <g class="badge-outer">
        <circle cx="48" cy="48" r="44" fill="none" stroke="rgba(168,85,247,0.3)" stroke-width="0.5"/>
        <text font-family="inherit" font-size="7" fill="#a855f7" letter-spacing="2.5">
          <textPath href="#cp">日记  ·  每天  ·  光与影  ·  洛杉矶  ·  2026  ·  胶片  ·</textPath>
        </text>
      </g>
      <g class="badge-inner">
        <!-- 中间图标区：换成阿里图标 path 即可 -->
        <text x="48" y="46" text-anchor="middle" font-family="inherit" font-weight="900" font-size="20" fill="rgba(240,235,224,0.85)">🐟</text>
        <text x="48" y="62" text-anchor="middle" font-family="inherit" font-weight="700" font-size="9" fill="rgba(168,85,247,0.7)" letter-spacing="1">DIARY</text>
      </g>
    </svg>
  </div>`;
}

function Nav(active){
  const links=[
    {id:'home',label:'首页'},
    {id:'featured',label:'精选照片'},
    {id:'all',label:'所有图片'},
    {id:'masterpiece',label:'名画'},
    {id:'upload',label:'上传'},
  ];
  return `<nav>
    <button class="nav-logo" onclick="setState({page:'home',active:null})">紫 - lv - 🐟</button>
    <div class="nav-links">
      ${links.map(l=>`<button class="nav-link${active===l.id?' active':''}" onclick="setState({page:'${l.id}',active:null})">${l.label}</button>`).join('')}
    </div>
  </nav>`;
}

function HomePage(){
  const cards=DIARY.map((entry,i)=>{
    const isFeat=i%4===0;
    const h=isFeat?'72vh':'56vh';
    return `
      <div class="entry" data-i="${i}" style="padding:0 32px;margin-bottom:6px;transition-delay:${i*0.06}s">
        <div class="card" onclick="openEntry(${i},0)">
          <div style="position:relative;height:${h};overflow:hidden;">
            <img class="card-img" src="${entry.photos[0].url}" alt="" loading="lazy"/>
            <div style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(to top,rgba(8,8,8,0.92) 0%,rgba(8,8,8,0.06) 50%,transparent 100%);"></div>
            <div class="open-badge"><span style="font-size:12px;letter-spacing:0.2em;border:1px solid #a855f7;color:#a855f7;padding:10px 24px;">打开</span></div>
            <div style="position:absolute;bottom:22px;left:22px;right:22px;display:flex;justify-content:space-between;align-items:flex-end;">
              <div>
                <div style="font-size:12px;letter-spacing:0.1em;color:#a855f7;margin-bottom:10px;">${entry.day} · ${entry.mood}</div>
                <div style="font-weight:900;font-size:clamp(22px,3.5vw,46px);line-height:0.95;letter-spacing:-0.01em;">${entry.date}</div>
              </div>
              <div style="font-size:11px;letter-spacing:0.05em;color:rgba(240,235,224,0.38);text-align:right;">
                ${entry.isMasterpiece?'<span style="color:#a855f7;display:block;margin-bottom:4px;">★ 名画</span>':''}
                ${entry.photos.length} ${entry.photos.length===1?'帧':'帧'}
              </div>
            </div>
          </div>
          <div style="padding:11px 2px 12px;border-bottom:1px solid rgba(240,235,224,0.04);">
            <p style="font-size:12px;line-height:1.7;color:rgba(240,235,224,0.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${entry.caption}</p>
          </div>
        </div>
      </div>
      ${i<DIARY.length-1?Marquee(MARQUEES[(i+1)%MARQUEES.length],22+i*4,i%2===0):''}
    `;
  }).join('');

  return `
    <div style="padding:72px 32px 48px;animation:fadeUp 0.9s ease both;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-size:12px;letter-spacing:0.15em;color:#a855f7;margin-bottom:22px;">${DIARY.length} 篇 · 洛杉矶 · 2026</div>
          <h1 style="font-weight:900;font-size:clamp(58px,9vw,108px);line-height:0.85;letter-spacing:-0.03em;color:#7c3aed;">紫色<br/>每天.</h1>
          <p style="margin-top:28px;font-size:13px;letter-spacing:0.05em;color:rgba(240,235,224,0.28);max-width:300px;line-height:1.9;">一台相机。一座城市。一段生命——被光的碎片捕捉。</p>
        </div>
        ${RotatingBadge()}
      </div>
    </div>
    ${Marquee(MARQUEES[0],34)}
    ${cards}
    <footer style="padding:64px 32px 40px;margin-top:32px;border-top:1px solid rgba(240,235,224,0.05);display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:22px;font-weight:900;background:linear-gradient(135deg,#7c3aed,#a855f7,#22c55e,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">紫 - lv - 🐟</span>
      <span style="font-size:11px;letter-spacing:0.1em;color:rgba(240,235,224,0.14);">© 2026 日记</span>
    </footer>
  `;
}

function FeaturedPage(){
  const featured=DIARY.filter(e=>e.featured);
  return `
    <div style="padding:56px 32px 80px;">
      <div style="margin-bottom:8px;font-size:12px;letter-spacing:0.15em;color:#a855f7;">精选作品</div>
      <h2 style="font-weight:900;font-size:clamp(36px,6vw,72px);line-height:0.9;margin-bottom:48px;">精选照片</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:32px;">
        ${featured.map((entry,i)=>`
          <div style="animation:fadeUp ${0.4+i*0.12}s ease both;">
            <div class="polaroid" onclick="openEntry(${DIARY.indexOf(entry)},0)">
              <img src="${entry.photos[0].thumb}" alt="" loading="lazy" style="width:100%;aspect-ratio:1;object-fit:cover;display:block;"/>
              <div class="polaroid-date">${entry.date}</div>
              <div style="text-align:center;font-size:11px;color:#7c3aed;margin-top:2px;font-weight:700;">${entry.mood}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function AllPage(){
  const allPhotos=[];
  DIARY.forEach((entry,ei)=>entry.photos.forEach((p,pi)=>allPhotos.push({entry,ei,pi,url:p.thumb,date:entry.date,mood:entry.mood})));
  return `
    <div style="padding:56px 32px 80px;">
      <div style="margin-bottom:8px;font-size:12px;letter-spacing:0.15em;color:#a855f7;">档案馆 · ${allPhotos.length} 帧</div>
      <h2 style="font-weight:900;font-size:clamp(36px,6vw,72px);line-height:0.9;margin-bottom:48px;">所有图片</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:3px;">
        ${allPhotos.map((p,i)=>`
          <div class="grid-thumb" style="height:180px;animation:fadeIn ${0.2+i*0.04}s ease both;" onclick="openEntry(${p.ei},${p.pi})">
            <img src="${p.url}" alt="" loading="lazy"/>
            <div class="grid-thumb-meta">
              <div style="font-size:11px;color:#a855f7;">${p.mood}</div>
              <div style="font-size:11px;color:rgba(240,235,224,0.6);margin-top:2px;">${p.date}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function MasterpiecePage(){
  const masters=DIARY.filter(e=>e.isMasterpiece);
  if(!masters.length)return `<div style="padding:120px 32px;text-align:center;">
    <div style="font-size:12px;letter-spacing:0.15em;color:rgba(240,235,224,0.2);margin-bottom:24px;">名画收藏</div>
    <p style="font-size:28px;font-weight:900;color:rgba(240,235,224,0.3);">尚无名画收录</p>
    <p style="font-size:12px;color:rgba(240,235,224,0.15);margin-top:16px;">上传照片时选择「是，这是名画」即可加入</p>
  </div>`;
  return `
    <div style="padding:56px 32px 80px;">
      <div style="margin-bottom:8px;font-size:12px;letter-spacing:0.15em;color:#a855f7;">名画收藏 · ${masters.length} 件</div>
      <h2 style="font-weight:900;font-size:clamp(36px,6vw,72px);line-height:0.9;margin-bottom:48px;">名画</h2>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${masters.map((entry,i)=>`
          <div style="animation:fadeUp ${0.4+i*0.15}s ease both;">
            <div class="card" onclick="openEntry(${DIARY.indexOf(entry)},0)">
              <div style="position:relative;height:480px;overflow:hidden;">
                <img class="card-img" src="${entry.photos[0].url}" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;"/>
                <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,8,0.9) 0%,transparent 60%);pointer-events:none;"></div>
                <div class="open-badge"><span style="font-size:12px;border:1px solid #a855f7;color:#a855f7;padding:10px 24px;">打开</span></div>
                <div style="position:absolute;top:16px;right:16px;font-size:11px;color:#a855f7;border:1px solid rgba(168,85,247,0.4);padding:4px 10px;">★ 名画</div>
                <div style="position:absolute;bottom:22px;left:22px;">
                  <div style="font-size:12px;color:#a855f7;margin-bottom:8px;">${entry.day} · ${entry.mood}</div>
                  <div style="font-weight:900;font-size:clamp(20px,3vw,38px);line-height:1;">${entry.date}</div>
                </div>
              </div>
              <div style="padding:12px 2px;border-bottom:1px solid rgba(240,235,224,0.04);">
                <p style="font-size:12px;line-height:1.7;color:rgba(240,235,224,0.32);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${entry.caption}</p>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function UploadPage(){
  return `
    <div style="padding:56px 32px 80px;max-width:680px;margin:0 auto;">
      <div style="margin-bottom:8px;font-size:12px;letter-spacing:0.15em;color:#a855f7;">添加新日记</div>
      <h2 style="font-weight:900;font-size:clamp(36px,6vw,64px);line-height:0.9;margin-bottom:48px;">上传照片</h2>
      <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this)"/>
        <div style="font-size:40px;margin-bottom:12px;opacity:0.3;">+</div>
        <div style="font-size:13px;color:rgba(240,235,224,0.3);">点击选择照片 或 拖入此处</div>
        <div style="font-size:12px;color:rgba(240,235,224,0.15);margin-top:8px;">支持 JPG / PNG / WEBP</div>
      </div>
      <div id="preview-area" style="display:none;margin-top:32px;">
        <div id="preview-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:32px;"></div>
        <div style="margin-bottom:20px;">
          <div style="font-size:12px;color:rgba(240,235,224,0.4);margin-bottom:10px;">日期</div>
          <input type="date" id="entry-date" style="background:rgba(240,235,224,0.05);border:1px solid rgba(240,235,224,0.12);color:#f0ebe0;padding:10px 14px;font-family:inherit;font-size:13px;width:100%;" value="${new Date().toISOString().slice(0,10)}"/>
        </div>
        <div style="margin-bottom:20px;">
          <div style="font-size:12px;color:rgba(240,235,224,0.4);margin-bottom:10px;">心情标签</div>
          <input type="text" id="entry-mood" placeholder="黄金时刻" style="background:rgba(240,235,224,0.05);border:1px solid rgba(240,235,224,0.12);color:#f0ebe0;padding:10px 14px;font-family:inherit;font-size:13px;width:100%;"/>
        </div>
        <div style="margin-bottom:20px;">
          <div style="font-size:12px;color:rgba(240,235,224,0.4);margin-bottom:10px;">文案（选填）</div>
          <textarea id="entry-caption" placeholder="记录今天..." rows="3" style="background:rgba(240,235,224,0.05);border:1px solid rgba(240,235,224,0.12);color:#f0ebe0;padding:10px 14px;font-family:inherit;font-size:13px;width:100%;line-height:1.7;resize:vertical;"></textarea>
        </div>
        <div style="margin-bottom:32px;display:flex;align-items:center;gap:16px;">
          <div style="font-size:13px;color:rgba(240,235,224,0.4);">这是名画吗？</div>
          <button class="toggle-btn" id="masterpiece-toggle" onclick="toggleMasterpiece()">否，普通照片</button>
        </div>
        <div style="display:flex;gap:0;align-items:center;justify-content:space-between;">
          <div style="font-size:12px;color:rgba(240,235,224,0.2);">保存到云端，换设备也能看到</div>
          <button data-save-entry onclick="submitEntry()" style="background:#7c3aed;border:none;color:#fff;cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:0.1em;padding:14px 28px;font-weight:700;transition:opacity 0.2s;" onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">保存日记 →</button>
        </div>
      </div>
    </div>
  `;
}

function DetailView(entry,pidx){
  const n=entry.photos.length;
  const photo=entry.photos[pidx];
  const prev=(pidx-1+n)%n, next=(pidx+1)%n;
  return `
    <div style="display:flex;flex-direction:column;min-height:100vh;background:#070707;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 28px;border-bottom:1px solid rgba(240,235,224,0.05);">
        <button class="backbtn" onclick="setState({page:'home',active:null})">← 返回</button>
        <div style="text-align:center;">
          <div style="font-size:15px;font-weight:900;color:rgba(240,235,224,0.65);">${entry.date}</div>
          <div style="font-size:12px;color:#a855f7;margin-top:4px;">${entry.day} · ${entry.mood}${entry.isMasterpiece?' · ★ 名画':''}</div>
        </div>
        <div style="font-size:13px;color:rgba(240,235,224,0.28);min-width:56px;text-align:right;">${pidx+1} / ${n}</div>
      </div>
      <div style="flex:1;min-height:520px;position:relative;display:flex;align-items:center;justify-content:center;background:#050505;overflow:hidden;">
        <img src="${photo.url}" alt="" style="max-width:92%;max-height:72vh;object-fit:contain;animation:fadeIn 0.28s ease both;"/>
        ${n>1?`<button class="nbtn" onclick="setState({page:'detail',active:state.active,pidx:${prev}})" style="position:absolute;left:14px;">‹</button><button class="nbtn" onclick="setState({page:'detail',active:state.active,pidx:${next}})" style="position:absolute;right:14px;">›</button>`:''}
        ${n>1?`<div class="dot-progress" style="position:absolute;bottom:16px;left:0;right:0;text-align:center;">${entry.photos.map((_,i)=>`<span class="${i===pidx?'on':''}" onclick="setState({page:'detail',active:state.active,pidx:${i}})"></span>`).join('')}</div>`:''}
      </div>
      <div style="flex-shrink:0;border-top:1px solid rgba(240,235,224,0.05);padding:20px 28px;display:flex;gap:28px;align-items:flex-start;background:#070707;">
        <div style="flex:1;">
          <p style="font-size:13px;line-height:1.9;color:rgba(240,235,224,0.55);max-width:580px;">${entry.caption}</p>
          <div style="margin-top:14px;font-size:11px;color:rgba(240,235,224,0.2);">← → 切换 · ESC 返回</div>
        </div>
        ${n>1?`<div style="display:flex;gap:6px;flex-shrink:0;align-self:center;">${entry.photos.map((p,i)=>`<button class="thb ${i===pidx?'on':''}" onclick="setState({page:'detail',active:state.active,pidx:${i}})"><img src="${p.thumb}" alt="" style="width:54px;height:38px;object-fit:cover;display:block;"/></button>`).join('')}</div>`:''}
      </div>
    </div>
  `;
}

function render(){
  const app=document.getElementById('app');
  if(state.page==='detail'&&state.active){app.innerHTML=DetailView(state.active,state.pidx);return;}
  let pg='';
  if(state.page==='home')pg=HomePage();
  else if(state.page==='featured')pg=FeaturedPage();
  else if(state.page==='all')pg=AllPage();
  else if(state.page==='masterpiece')pg=MasterpiecePage();
  else if(state.page==='upload')pg=UploadPage();
  app.innerHTML=Nav(state.page)+pg;
  if(state.page==='home'){
    setTimeout(()=>{
      const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target);}},{threshold:0.06});
      document.querySelectorAll('.entry').forEach(el=>obs.observe(el));
    },50);
  }
}

function openEntry(ei,pi){state.active=DIARY[ei];state.pidx=pi;state.page='detail';render();window.scrollTo(0,0);}

let isMasterpiece=false;
let uploadedPhotos=[];
let uploadedFiles=[];
function toggleMasterpiece(){
  isMasterpiece=!isMasterpiece;
  const btn=document.getElementById('masterpiece-toggle');
  if(btn){btn.textContent=isMasterpiece?'是，这是名画':'否，普通照片';btn.classList.toggle('on',isMasterpiece);}
}

function handleFiles(input){
  const files=Array.from(input.files);
  if(!files.length)return;
  const pa=document.getElementById('preview-area'),pg=document.getElementById('preview-grid');
  pa.style.display='block';pg.innerHTML='';uploadedPhotos=[];uploadedFiles=files;
  files.forEach((f,index)=>{
    const r=new FileReader();
    r.onload=e=>{
      uploadedPhotos[index]={url:e.target.result,thumb:e.target.result};
      const d=document.createElement('div');d.style.cssText='aspect-ratio:1;overflow:hidden;';
      const img=document.createElement('img');img.src=e.target.result;img.style.cssText='width:100%;height:100%;object-fit:cover;';
      d.appendChild(img);pg.appendChild(d);
    };
    r.readAsDataURL(f);
  });
}

async function submitEntry(){
  const d=document.getElementById('entry-date'),m=document.getElementById('entry-mood'),c=document.getElementById('entry-caption');
  if(!d||!m)return;
  if(!uploadedFiles.length){alert('请先选择至少一张照片');return;}
  const btn=document.querySelector('button[data-save-entry]');
  if(btn){btn.disabled=true;btn.textContent='正在保存...';btn.style.opacity=0.65;}
  try{
    const form=new FormData();
    form.append('date',d.value);
    form.append('mood',m.value||'新记录');
    form.append('caption',c?c.value:'新的记忆。');
    form.append('isMasterpiece',String(isMasterpiece));
    uploadedFiles.forEach(file=>form.append('photos',file,file.name));
    const res=await fetch('/api/entries',{method:'POST',body:form});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'保存失败');
    DIARY.unshift(data.entry);
    uploadedPhotos=[];uploadedFiles=[];
    isMasterpiece=false;
    setState({page:'home',active:null});
    alert('日记已保存到云端');
  }catch(e){
    alert(e.message||'保存失败，请稍后再试');
  }finally{
    if(btn){btn.disabled=false;btn.textContent='保存日记 →';btn.style.opacity=1;}
  }
}

document.addEventListener('keydown',e=>{
  if(state.page!=='detail'||!state.active)return;
  const n=state.active.photos.length;
  if(e.key==='ArrowRight')setState({page:'detail',active:state.active,pidx:(state.pidx+1)%n});
  if(e.key==='ArrowLeft')setState({page:'detail',active:state.active,pidx:(state.pidx-1+n)%n});
  if(e.key==='Escape')setState({page:'home',active:null});
});

render();
loadCloudEntries();
</script>
</body>
</html>
